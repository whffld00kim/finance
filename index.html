<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="가계부" />
  <meta name="theme-color" content="#5B4FCF" />
  <title>우리집 가계부</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css?v=20260407" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ======== 앱 래퍼 ======== -->
<div id="app">

  <!-- ======== 페이지: 홈 ======== -->
  <section id="page-home" class="page active">
    <div class="page-header">
      <h1 class="page-title">우리집 가계부</h1>
      <div class="month-nav">
        <button class="month-btn" id="home-prev">&#8249;</button>
        <span class="month-label" id="home-month"></span>
        <button class="month-btn" id="home-next">&#8250;</button>
      </div>
    </div>
    <div class="page-body">
      <!-- 잔액 카드 -->
      <div class="balance-card">
        <div class="balance-row">
          <div class="balance-col" style="flex:1.4">
            <div class="balance-label">이번달 잔액</div>
            <div class="balance-amount" id="home-balance">0</div>
          </div>
          <div class="balance-divider"></div>
          <div class="balance-col" style="flex:1">
            <div class="balance-label" style="font-size:11px">이월잔액</div>
            <div class="balance-amount balance-carry" id="home-carry">0</div>
          </div>
        </div>
      </div>
      <!-- 수입/지출 그리드 -->
      <div class="summary-grid">
        <div class="summary-item income-item">
          <span class="summary-label">총 수입</span>
          <span class="summary-val income-val" id="home-income">₩0</span>
        </div>
        <div class="summary-item expense-item">
          <span class="summary-label">총 지출</span>
          <span class="summary-val expense-val" id="home-expense">₩0</span>
        </div>
      </div>
      <!-- 주체별 요약 -->
      <div class="card">
        <div class="card-head">주체별 현황</div>
        <div id="home-subjects"></div>
      </div>
      <!-- 최근 내역 -->
      <div class="section-head">
        <span>최근 내역</span>
        <button class="text-btn" id="btn-see-all">전체 보기</button>
      </div>
      <div id="home-recent"></div>
      <!-- 백업 / 불러오기 -->
      <div class="backup-row">
        <button class="backup-btn" id="btn-backup">백업</button>
        <button class="backup-btn restore" id="btn-restore">불러오기</button>
        <input type="file" id="restore-file" accept=".json" style="display:none" />
      </div>
    </div>
  </section>

  <!-- ======== 페이지: 내역 ======== -->
  <section id="page-history" class="page">
    <div class="page-header">
      <h1 class="page-title">내역</h1>
      <div class="month-nav">
        <button class="month-btn" id="hist-prev">&#8249;</button>
        <span class="month-label" id="hist-month"></span>
        <button class="month-btn" id="hist-next">&#8250;</button>
      </div>
      <button class="delete-all-btn" id="btn-delete-all">전체 삭제</button>
    </div>
    <div class="page-body">
      <!-- 구분 필터 -->
      <div class="filter-tabs" id="hist-type-tabs">
        <button class="ftab active" data-val="all">전체</button>
        <button class="ftab" data-val="income">입금</button>
        <button class="ftab" data-val="expense">출금</button>
      </div>
      <!-- 주체 필터 -->
      <div class="chip-group" id="hist-subject-chips">
        <button class="chip selected" data-val="all">전체</button>
        <button class="chip" data-val="도연">도연</button>
        <button class="chip" data-val="민성">민성</button>
        <button class="chip" data-val="공통">공통</button>
      </div>
      <div id="history-list"></div>
    </div>
  </section>

  <!-- ======== 페이지: 통계 ======== -->
  <section id="page-stats" class="page">
    <div class="page-header">
      <h1 class="page-title">통계</h1>
      <div class="month-nav">
        <button class="month-btn" id="stats-prev">&#8249;</button>
        <span class="month-label" id="stats-month"></span>
        <button class="month-btn" id="stats-next">&#8250;</button>
      </div>
    </div>
    <div class="page-body">
      <!-- 월별 막대 차트 -->
      <div class="card">
        <div class="card-head">월별 수입 / 지출</div>
        <div class="chart-box"><canvas id="chart-bar"></canvas></div>
      </div>
      <!-- 지출 도넛 -->
      <div class="card">
        <div class="card-head">이번달 지출 내역</div>
        <div class="donut-wrap">
          <div class="donut-box"><canvas id="chart-expense-donut"></canvas></div>
          <ul class="donut-legend" id="expense-legend"></ul>
        </div>
        <p class="empty-chart" id="expense-empty" style="display:none">지출 내역이 없습니다.</p>
      </div>
      <!-- 수입 도넛 -->
      <div class="card">
        <div class="card-head">이번달 수입 내역</div>
        <div class="donut-wrap">
          <div class="donut-box"><canvas id="chart-income-donut"></canvas></div>
          <ul class="donut-legend" id="income-legend"></ul>
        </div>
        <p class="empty-chart" id="income-empty" style="display:none">수입 내역이 없습니다.</p>
      </div>
      <!-- 주체별 상세 -->
      <div class="card">
        <div class="card-head">주체별 상세</div>
        <div id="stats-subjects"></div>
      </div>
    </div>
  </section>

  <!-- ======== 페이지: 고정 ======== -->
  <section id="page-fixed" class="page">
    <div class="page-header">
      <h1 class="page-title">고정 항목</h1>
    </div>
    <div class="page-body">
      <div class="fixed-header-row">
        <p class="fixed-hint">매월 반복 거래를 등록 후 한 번에 입력하세요</p>
        <button class="text-btn" id="btn-add-fixed">+ 추가</button>
      </div>
      <div id="fixed-list"></div>
      <button class="fixed-apply-btn" id="btn-apply-fixed">이번달 입력하기</button>
    </div>
  </section>

  <!-- ======== 페이지: 비정기 현황 ======== -->
  <section id="page-irregular" class="page">
    <div class="page-header">
      <h1 class="page-title">비정기 현황</h1>
      <div class="month-nav">
        <button class="month-btn" id="irr-prev">&#8249;</button>
        <span class="month-label" id="irr-year"></span>
        <button class="month-btn" id="irr-next">&#8250;</button>
      </div>
    </div>
    <div class="page-body">
      <div class="card" id="irr-summary"></div>
      <div id="irr-cat-list"></div>
      <button class="fixed-apply-btn" id="btn-add-irr-cat" style="margin-top:12px">+ 카테고리 추가</button>
    </div>
  </section>

  <!-- ======== 페이지: 이체계산 ======== -->
  <section id="page-transfer" class="page">
    <div class="page-header">
      <h1 class="page-title">이체계산</h1>
    </div>
    <div class="page-body">
      <div id="deduct-list"></div>
      <div id="living-list" style="margin-top:16px"></div>
    </div>
  </section>

  <!-- ======== 하단 네비게이션 ======== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home" id="nav-home">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z"/>
        <path d="M12 5.432 8.16 9.277a4.5 4.5 0 0 0-1.335 3.183v6.787a.75.75 0 0 0 .75.75H9.75a.75.75 0 0 0 .75-.75v-4.5a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 0 .75.75h2.175a.75.75 0 0 0 .75-.75V12.46a4.5 4.5 0 0 0-1.335-3.183L12 5.432Z"/>
      </svg>
      <span>홈</span>
    </button>
    <button class="nav-item" data-page="history" id="nav-history">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M5.625 1.5c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h12.75c1.035 0 1.875-.84 1.875-1.875V12.75A3.75 3.75 0 0 0 16.5 9h-1.875a1.875 1.875 0 0 1-1.875-1.875V5.25A3.75 3.75 0 0 0 9 1.5H5.625Zm7.5 8.25a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5a.75.75 0 0 1 .75-.75ZM9 15a.75.75 0 0 1 .75-.75H12a.75.75 0 0 1 0 1.5H9.75A.75.75 0 0 1 9 15ZM9.75 10.5a.75.75 0 0 0 0 1.5H12a.75.75 0 0 0 0-1.5H9.75Z" clip-rule="evenodd"/>
        <path d="M12.971 1.816A5.23 5.23 0 0 1 14.25 5.25v1.875c0 .207.168.375.375.375H16.5a5.23 5.23 0 0 1 3.434 1.279 9.768 9.768 0 0 0-6.963-6.963Z"/>
      </svg>
      <span>내역</span>
    </button>
    <button class="nav-item nav-add-btn" id="nav-add">
      <div class="add-circle">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12 3.75a.75.75 0 0 1 .75.75v6.75h6.75a.75.75 0 0 1 0 1.5h-6.75v6.75a.75.75 0 0 1-1.5 0v-6.75H4.5a.75.75 0 0 1 0-1.5h6.75V4.5a.75.75 0 0 1 .75-.75Z" clip-rule="evenodd"/>
        </svg>
      </div>
      <span>추가</span>
    </button>
    <button class="nav-item" data-page="stats" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.375 2.25c-1.035 0-1.875.84-1.875 1.875v15.75c0 1.035.84 1.875 1.875 1.875h.75c1.035 0 1.875-.84 1.875-1.875V4.125c0-1.036-.84-1.875-1.875-1.875h-.75ZM9.75 8.625c0-1.036.84-1.875 1.875-1.875h.75c1.036 0 1.875.84 1.875 1.875v11.25c0 1.035-.84 1.875-1.875 1.875h-.75a1.875 1.875 0 0 1-1.875-1.875V8.625ZM3 13.125c0-1.036.84-1.875 1.875-1.875h.75c1.036 0 1.875.84 1.875 1.875v6.75c0 1.035-.84 1.875-1.875 1.875h-.75A1.875 1.875 0 0 1 3 19.875v-6.75Z"/>
      </svg>
      <span>통계</span>
    </button>
    <button class="nav-item" data-page="fixed" id="nav-fixed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
      </svg>
      <span>고정</span>
    </button>
    <button class="nav-item" data-page="irregular" id="nav-irregular">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>
      </svg>
      <span>비정기</span>
    </button>
    <button class="nav-item" data-page="transfer" id="nav-transfer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/>
      </svg>
      <span>이체</span>
    </button>
  </nav>
</div>

<!-- ======== 거래 추가/수정 모달 ======== -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <h2 id="modal-title">거래 추가</h2>
      <button class="modal-close-btn" id="modal-close">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ======== 토스트 ======== -->
<div id="toast" class="toast hidden"></div>

<script src="js/app.js?v=20260407"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
